  <text x="188" y="318" fill="#84B8FF" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Session Outcome</text>
  <text x="188" y="380" fill="#F6BC4D" font-size="54" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Conditional Deal</text>
  <text x="188" y="426" fill="#9EB0C9" font-size="18" font-family="Segoe UI, Arial, sans-serif">The negotiation stayed constructive but required written checkpoints.</text>
  <text x="612" y="318" fill="#84B8FF" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Key Strength</text>
  <text x="612" y="380" fill="#F2F5F9" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Clarified scope before conceding</text>
  <text x="612" y="426" fill="#9EB0C9" font-size="18" font-family="Segoe UI, Arial, sans-serif">The user pressed for milestones and documentation instead of accepting vague promises.</text>
  <text x="1036" y="318" fill="#84B8FF" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Next Improvement</text>
  <text x="1036" y="380" fill="#F2F5F9" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Anchor earlier with quantified value</text>
  <text x="1036" y="426" fill="#9EB0C9" font-size="18" font-family="Segoe UI, Arial, sans-serif">Bring impact metrics before discussing compensation to increase leverage sooner.</text>

  <text x="156" y="528" fill="#F4E9D5" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Turning Points</text>
  <rect x="156" y="560" width="1288" height="236" rx="24" fill="#0F1724" stroke="#202C3E"/>

  <circle cx="214" cy="640" r="10" fill="#4BC9FF"/>
  <rect x="244" y="604" width="1130" height="72" rx="18" fill="#162132"/>
  <text x="272" y="636" fill="#F4F7FA" font-size="22" font-family="Segoe UI, Arial, sans-serif">Turn 2 · User reframed the request around role scope and review timing</text>
  <text x="272" y="666" fill="#90A3BD" font-size="17" font-family="Segoe UI, Arial, sans-serif">This shifted the discussion from “raise now or no” to a structured adjustment path.</text>

  <circle cx="214" cy="728" r="10" fill="#F4BD53"/>
  <rect x="244" y="692" width="1130" height="72" rx="18" fill="#162132"/>
  <text x="272" y="724" fill="#F4F7FA" font-size="22" font-family="Segoe UI, Arial, sans-serif">Turn 4 · Opponent introduced phased compensation instead of rejecting outright</text>
  <text x="272" y="754" fill="#90A3BD" font-size="17" font-family="Segoe UI, Arial, sans-serif">The dialogue remained open, but the burden shifted to getting concrete review checkpoints.</text>
