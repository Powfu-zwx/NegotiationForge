  <text x="156" y="184" fill="#98A7BA" font-size="22" font-family="Segoe UI, Arial, sans-serif">Salary negotiation / HR Director / completed session</text>

  <rect x="1288" y="100" width="128" height="44" rx="14" fill="#162031"/>
  <text x="1332" y="129" fill="#C6D1DF" font-size="18" font-family="Segoe UI, Arial, sans-serif">Close</text>

  <rect x="156" y="228" width="1288" height="1" fill="#243244"/>

  <rect x="156" y="272" width="382" height="190" rx="22" fill="#151F2E"/>
  <rect x="580" y="272" width="382" height="190" rx="22" fill="#151F2E"/>
